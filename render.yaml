services:
  - type: web
    name: relay-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: relay-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
  - type: worker
    name: relay-worker
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run worker
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: relay-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
databases:
  - name: relay-db
    plan: free
